<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Auspoty</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .logo { font-size: 32px; font-weight: 700; color: #a78bfa; letter-spacing: 2px; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 14px; }
    .btn-google {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google img { width: 20px; height: 20px; }
    .status { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(167,139,250,0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">Auspoty</div>
  <div class="subtitle">Login dengan akun Google kamu</div>
  <button class="btn-google" id="btnLogin" onclick="doLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Masuk dengan Google
  </button>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAYJEVXTS17vEX4J6_ymevMiJUnWV-Xf8Q",
      authDomain: "auspoty-web.firebaseapp.com",
      projectId: "auspoty-web",
      storageBucket: "auspoty-web.firebasestorage.app",
      messagingSenderId: "355662875368",
      appId: "1:355662875368:web:2057b213f4b7794aae175d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');

    window.doLogin = async function() {
      const btn = document.getElementById('btnLogin');
      const spinner = document.getElementById('spinner');
      const status = document.getElementById('status');

      btn.style.display = 'none';
      spinner.style.display = 'block';
      status.textContent = 'Membuka akun Google...';

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const userData = {
          name: user.displayName || 'Pengguna Google',
          email: user.email || '',
          picture: user.photoURL || '',
          sub: user.uid || '',
        };

        // Simpan ke localStorage — akan dibaca oleh WebView utama
        localStorage.setItem('auspotyGoogleUser', JSON.stringify(userData));
        localStorage.setItem('auspotyLoginSuccess', Date.now().toString());

        status.textContent = 'Login berhasil! Kembali ke app...';
        spinner.style.display = 'none';

        // Tutup halaman ini dan balik ke app
        // window.close() works kalau dibuka via Custom Tab
        setTimeout(() => {
          window.close();
          // Fallback: redirect ke halaman utama
          window.location.href = '/';
        }, 1000);

      } catch(e) {
        spinner.style.display = 'none';
        btn.style.display = 'flex';
        status.textContent = 'Login gagal: ' + (e.message || e.code || 'Coba lagi');
        console.error(e);
      }
    };

    // Auto-login kalau sudah ada session
    auth.onAuthStateChanged((user) => {
      if (user) {
        const userData = {
          name: user.displayName || 'Pengguna Google',
          email: user.email || '',
          picture: user.photoURL || '',
          sub: user.uid || '',
        };
        localStorage.setItem('auspotyGoogleUser', JSON.stringify(userData));
        localStorage.setItem('auspotyLoginSuccess', Date.now().toString());
        document.getElementById('status').textContent = 'Sudah login! Kembali ke app...';
        setTimeout(() => {
          window.close();
          window.location.href = '/';
        }, 800);
      }
    });
  </script>
</body>
</html>
